seed: 7
device: auto
output_dir: debug_search/
save_csvs: true

unlearned_model:
  model_family: llama3-8b-instruct # llama2-7b-chat | llama3-8b-instruct | gemma-7b-it
  # model_path: unlearn_results/completions/lunar/gemma-7b-it/pistol_sample1/model                                    # LUNAR: pistol_sample1/ or tofu_full/
  model_path: /nfs-share/ahta3/workspace/PISTOL/models_forget/llama3-8b-instruct_forget_dusk/npo_20epochs_LoRA32_lr5e-05   # baselines: see PISTOL

# Optional white-box baseline model for activation-distance comparisons.
white_box:
  enabled: false
  layers: [22]
  ignorance_direction_path: ""

base_model:
  model_family: llama2-7b-chat
  model_path: /nfs-share/ahta3/workspace/PISTOL/models_finetune/pistol_sample1/llama2-7b-chat # pistol_sample1/ or tofu/

prompts:
  dataset_name: dusk # pistol_sample1 or tofu or dusk
  num_target_entities: 1 # 2 for pistol, 1 for tofu and dusk
  prompt_key: question
  forget_edge: ['Roland_Lancaster_personal'] # ['A_B'] for pistol, ['author_1_personal'] for tofu, ['Roland_Lancaster_personal'] for dusk
  limit: -1 # -1 if you want to use all prompts
  shuffle: true
  inline_prompts: []
  filter_short_factual: false

max_new_tokens: 64
first_n_tokens: 24

perturbations:
  operators:
    - entity_swap
  k_per_operator: 3

cliff:
  threshold: 0.25
  refusal_threshold: 0.5

refusal:
  use_embeddings: false # false for pistol, true for tofu
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  # Soft tiebreaker: when completion didn't literally say "I cannot" but the
  # model briefly considered it (high "cannot" token prob in first k tokens),
  # fold that in as max(regex_score, token_blend * cannot_max). 0 disables.
  token_blend: 0.5

search_mode: smart      # smart | brute | random | greedy (greedy refusal-score baseline)

smart_search:
  signal: refusal       # bandit reward driver: refusal | entropy | combined
  entropy_gain: 1.0     # logistic sharpness (in z-units) for the entropy->reward map
  entropy_pos_z: 1.3    # entropy z >= this earns positive credit (entropy/combined only)
  entropy_neg_z: -0.5   # entropy z <= this earns negative credit; the band between is skipped
  entropy_topk: 3       # retain top-k entropies per entity for max/top-k pooling (1 = pure max)
  cosample_prob: 0.0    # P(Thompson step anchors the top suspect & sweeps the other slot for its partner). 0.5 for pistol | 0 for single-entity
  warmup_per_pair: 1    # guaranteed probes per ordered (a,b) before Thompson. 2 for pistol | 1 for dusk | 10 for tofu
  full_coverage: true   # probe every candidate >=1x in warm-up before Thompson (O(#entities), not pairs). Stops the target being skipped when budget ~ #entities (e.g. dusk: 100 budget/71 ents). false = old budget//2 warm-up
  symmetric_probe: true # query both (a,b) and (b,a) per Thompson step
  budget: 100          # fallback probe budget if dataset not in budget_by_dataset below
  budget_by_dataset:   # per-dataset budget, keyed by prompts.dataset_name (wins over `budget`)
    dusk: 1000
    pistol_sample1: 1000
    tofu: 30000
  phase_alloc:           # fractional budget caps per phase (of the resolved budget).
    # Warm-up and confirm are HARD caps; Thompson gets the remainder AND absorbs
    # any warm-up/confirm underspend, so its fraction is a floor, not a cap. This
    # replaces the old fixed costs (warm-up = #entities, confirm = top_k*templates)
    # that consumed nearly the whole budget and starved Thompson when budget ~
    # #entities (the dusk-at-100 failure). Tune freely to experiment:
    #   old single-entity behaviour ≈ warmup: 0.0, confirm: 0.0 (all Thompson).
    warmup: 0.2          # cap on warm-up + coverage-fill spend
    confirm: 0.1         # cap reserved for the confirm phase
    thompson: 0.7        # informational: the intended remainder (1 - warmup - confirm)
  early_stop:
    enabled: false
    min_spent: 20        # don't even check before this many probes. 50 for pistol | 20 for dusk
    check_every: 5       # amortize the sort/gap computation
    gap_threshold: 0.15  # top1.mean - top2.mean must exceed this in every slot. 0.2 for pistol | 0.15 for dusk
    min_top1_count: 5    # top1 needs at least this many real probes
  confirm:               # tie-break phase: equal probes for top-k after Thompson
    enabled: true        # false = old pure-Thompson ranking
    top_k: 5             # how many top candidates per (confirmed) slot to re-measure
    probes_per_candidate: 15  # equal probes each, on a fixed shared template set (capped by #templates and reserved budget//3)
    # Exhaustive fallback for sparse-directional signals (e.g. pistol). When no
    # slot's top posterior mean clears flat_threshold, Thompson never saw the
    # pair, so instead of confirming its noise top-k, sweep `exhaustive_anchors`
    # candidate anchors (ranked by largest sub-threshold refusal observed)
    # against ALL partners in both orderings. Reserves up to budget//2; gated on
    # flatness so it's a no-op when Thompson converges. Enable per-run for pistol
    # via smart_search.confirm.exhaustive_if_flat=true.
    exhaustive_if_flat: false
    exhaustive_anchors: 3            # candidate anchors to sweep when flat
    exhaustive_probes_per_candidate: 4  # templates per (anchor,partner,ordering) cell
    flat_threshold: 0.5             # max slot-top posterior mean below this => flat

reward_weights:
  refusal_score: 1.2
  entropy: 0.8
  gap: -0.3
  instability: 1.0
  length_penalty: 0.1

clustering:
  kmeans_k: 4
  dbscan_eps: 0.8
  dbscan_min_samples: 4

rl:
  enabled: true
  mode: entity_generator # operator_bandit | entity_generator
  epsilon: 0.2
  episodes: 12
  max_steps: 5
  entity_generator:
    candidate_top_k: 256
    lr: 0.05
    temperature: 1.0
    epsilon: 0.15
    top_k_log: 20
